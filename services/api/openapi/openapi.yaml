openapi: 3.1.0
info:
  title: Memory Safe English API
  version: 0.1.0
  description: MVP contract for the Memory Safe English mobile client and backend API.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Auth
  - name: User
  - name: Sessions
  - name: Analysis
  - name: Contents
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
  /auth/register:
    post:
      tags: [Auth]
      summary: Register with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Reissue access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /me:
    get:
      tags: [User]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /analysis/chunks:
    post:
      tags: [Analysis]
      summary: Analyze raw text into memory-safe chunks through the worker service
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeChunksRequest"
      responses:
        "200":
          description: Chunking result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkingResult"
  /analysis/skeleton:
    post:
      tags: [Analysis]
      summary: Extract memory-safe sentence skeleton through the worker service
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeChunksRequest"
      responses:
        "200":
          description: Skeleton result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkeletonResult"
  /contents:
    get:
      tags: [Contents]
      summary: List learning contents
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema: { type: string }
        - name: level
          in: query
          schema: { type: string }
        - name: topic
          in: query
          schema: { type: string }
        - name: language
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Content list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Content"
    post:
      tags: [Contents]
      summary: Create a learning content item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentUpsertRequest"
      responses:
        "201":
          description: Content created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Content"
  /contents/{contentId}:
    get:
      tags: [Contents]
      summary: Get one content item
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ContentId"
      responses:
        "200":
          description: Content item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Content"
    patch:
      tags: [Contents]
      summary: Update one content item
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ContentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentUpsertRequest"
      responses:
        "200":
          description: Content updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Content"
  /contents/{contentId}/chunks:
    get:
      tags: [Contents]
      summary: Get chunk analysis for a content item
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ContentId"
      responses:
        "200":
          description: Chunking result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkingResult"
  /contents/{contentId}/skeleton:
    get:
      tags: [Contents]
      summary: Get skeleton analysis for a content item
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ContentId"
      responses:
        "200":
          description: Skeleton result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkeletonResult"
  /sessions/start:
    post:
      tags: [Sessions]
      summary: Start a learning session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
  /sessions/{sessionId}/event:
    post:
      tags: [Sessions]
      summary: Record a session event
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionEventRequest"
      responses:
        "201":
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventLog"
  /sessions/{sessionId}/complete:
    post:
      tags: [Sessions]
      summary: Complete a learning session
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: custom-hmac-token
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    ContentId:
      name: contentId
      in: path
      required: true
      schema:
        type: string
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, display_name, agreed_to_terms]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        display_name:
          type: string
        agreed_to_terms:
          type: boolean
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    StartSessionRequest:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
        content_id:
          type: string
    AnalyzeChunksRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
        language:
          type: string
    ContentUpsertRequest:
      type: object
      required: [title, content_type, level, topic, language, raw_text]
      properties:
        title:
          type: string
        content_type:
          type: string
          enum: [reading, listening, speaking_template, rescue]
        level:
          type: string
        topic:
          type: string
        language:
          type: string
        raw_text:
          type: string
        summary_text:
          type: string
    SessionEventRequest:
      type: object
      required: [event_type]
      properties:
        event_type:
          type: string
        occurred_at:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        tokens:
          $ref: "#/components/schemas/TokenPair"
    User:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
        display_name:
          type: string
        auth_provider:
          type: string
        subscription_status:
          type: string
        created_at:
          type: string
          format: date-time
    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_at:
          type: string
          format: date-time
    Content:
      type: object
      properties:
        content_id:
          type: string
        title:
          type: string
        content_type:
          type: string
        level:
          type: string
        topic:
          type: string
        language:
          type: string
        raw_text:
          type: string
        summary_text:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Session:
      type: object
      properties:
        session_id:
          type: string
        user_id:
          type: string
        mode:
          type: string
        content_id:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        completion_state:
          type: string
    EventLog:
      type: object
      properties:
        event_id:
          type: string
        user_id:
          type: string
        session_id:
          type: string
        event_type:
          type: string
        payload:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    Chunk:
      type: object
      properties:
        order:
          type: integer
        text:
          type: string
        role:
          type: string
        skeleton_rank:
          type: integer
    ChunkingResult:
      type: object
      properties:
        version:
          type: string
        language:
          type: string
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/Chunk"
        summary:
          type: string
    SkeletonPart:
      type: object
      properties:
        order:
          type: integer
        text:
          type: string
        role:
          type: string
        emphasis:
          type: integer
    SkeletonResult:
      type: object
      properties:
        version:
          type: string
        language:
          type: string
        parts:
          type: array
          items:
            $ref: "#/components/schemas/SkeletonPart"
        summary:
          type: string
