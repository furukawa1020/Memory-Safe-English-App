openapi: 3.1.0
info:
  title: Memory Safe English API
  version: 0.1.0
  description: MVP contract for the Memory Safe English mobile client and backend API.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Auth
  - name: User
  - name: Sessions
  - name: Analysis
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
  /auth/register:
    post:
      tags: [Auth]
      summary: Register with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Reissue access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /me:
    get:
      tags: [User]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /analysis/chunks:
    post:
      tags: [Analysis]
      summary: Analyze raw text into memory-safe chunks through the worker service
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeChunksRequest"
      responses:
        "200":
          description: Chunking result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkingResult"
  /sessions/start:
    post:
      tags: [Sessions]
      summary: Start a learning session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
  /sessions/{sessionId}/event:
    post:
      tags: [Sessions]
      summary: Record a session event
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionEventRequest"
      responses:
        "201":
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventLog"
  /sessions/{sessionId}/complete:
    post:
      tags: [Sessions]
      summary: Complete a learning session
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: custom-hmac-token
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, display_name, agreed_to_terms]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        display_name:
          type: string
        agreed_to_terms:
          type: boolean
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    StartSessionRequest:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
        content_id:
          type: string
    AnalyzeChunksRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
        language:
          type: string
    SessionEventRequest:
      type: object
      required: [event_type]
      properties:
        event_type:
          type: string
        occurred_at:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        tokens:
          $ref: "#/components/schemas/TokenPair"
    User:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
        display_name:
          type: string
        auth_provider:
          type: string
        subscription_status:
          type: string
        created_at:
          type: string
          format: date-time
    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_at:
          type: string
          format: date-time
    Session:
      type: object
      properties:
        session_id:
          type: string
        user_id:
          type: string
        mode:
          type: string
        content_id:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        completion_state:
          type: string
    EventLog:
      type: object
      properties:
        event_id:
          type: string
        user_id:
          type: string
        session_id:
          type: string
        event_type:
          type: string
        payload:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    Chunk:
      type: object
      properties:
        order:
          type: integer
        text:
          type: string
        role:
          type: string
        skeleton_rank:
          type: integer
    ChunkingResult:
      type: object
      properties:
        language:
          type: string
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/Chunk"
        summary:
          type: string
