version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: mse-postgres
    environment:
      POSTGRES_DB: memory_safe_english
      POSTGRES_USER: mse
      POSTGRES_PASSWORD: mse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: mse-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
