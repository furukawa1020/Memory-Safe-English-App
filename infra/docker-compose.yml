version: "3.9"

services:
  proxy:
    build:
      context: ../services/proxy-rs
      dockerfile: Dockerfile
    container_name: mse-proxy
    environment:
      PROXY_HTTP_ADDR: 0.0.0.0:8070
      PROXY_API_BASE_URL: http://api:8080
      PROXY_WORKER_BASE_URL: http://worker:8090
      PROXY_ADMIN_TOKEN: dev-proxy-admin-token
      PROXY_CACHE_TTL_SECONDS: 300
      PROXY_GC_INTERVAL_SECONDS: 60
      PROXY_CACHE_MAX_ENTRIES: 1024
      PROXY_MAX_REQUEST_BODY_BYTES: 262144
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8070/ready"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: mse-api
    environment:
      API_HTTP_ADDR: :8080
      APP_ENV: development
      AUTH_TOKEN_SECRET: dev-insecure-change-me
      AUTH_ACCESS_TOKEN_TTL: 15m
      AUTH_REFRESH_TOKEN_TTL: 168h
      PASSWORD_HASH_ITERATIONS: 120000
      WORKER_BASE_URL: http://worker:8090
      WORKER_API_KEY: dev-worker-api-key
      WORKER_SIGNATURE_KEY: dev-worker-signature-key
      WORKER_TIMEOUT: 5s
      DATABASE_URL: postgres://mse:mse@postgres:5432/memory_safe_english?sslmode=disable
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      worker:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ../services/worker
      dockerfile: Dockerfile
    container_name: mse-worker
    environment:
      WORKER_HOST: 0.0.0.0
      WORKER_PORT: 8090
      WORKER_REQUIRE_API_KEY: "true"
      WORKER_API_KEYS: dev-worker-api-key
      WORKER_REQUIRE_REQUEST_SIGNATURE: "true"
      WORKER_SIGNATURE_KEYS: dev-worker-signature-key
      WORKER_SIGNATURE_MAX_AGE_SECONDS: 300
      WORKER_MAX_BODY_BYTES: 16384
      WORKER_MAX_TEXT_CHARS: 4000
      WORKER_REQUEST_TIMEOUT_SECONDS: 10
      WORKER_RATE_LIMIT_MAX_REQUESTS: 30
      WORKER_RATE_LIMIT_WINDOW_SECONDS: 60
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres:16
    container_name: mse-postgres
    environment:
      POSTGRES_DB: memory_safe_english
      POSTGRES_USER: mse
      POSTGRES_PASSWORD: mse
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mse -d memory_safe_english"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: mse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
